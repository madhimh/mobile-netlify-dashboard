<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>داشبورد الأسهم</title>

  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-title" content="داشبورد الأسهم" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="/apple-touch-icon.png" />

  <style>
    :root {
      --bg: #050505;
      --card: #111111;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --border: #262626;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #60a5fa;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 14px;
      padding-bottom: 90px;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    .header {
      margin: 6px 2px 14px;
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .index-card {
      padding: 16px;
      margin-bottom: 14px;
    }

    .index-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .index-name {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .status-pill {
      font-size: 12px;
      font-weight: 800;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.14);
      color: var(--green);
      white-space: nowrap;
    }

    .status-pill.offline {
      background: rgba(239, 68, 68, 0.14);
      color: var(--red);
    }

    .index-value {
      font-size: 32px;
      font-weight: 900;
      margin-top: 10px;
      direction: ltr;
      text-align: right;
    }

    .index-change {
      margin-top: 6px;
      font-size: 15px;
      font-weight: 800;
      direction: ltr;
      text-align: right;
    }

    .section {
      margin-top: 14px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 900;
      margin: 0 2px 10px;
    }

    .stocks {
      overflow: hidden;
    }

    .stock-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 15px;
      border-bottom: 1px solid var(--border);
    }

    .stock-row:last-child {
      border-bottom: none;
    }

    .stock-main {
      min-width: 0;
    }

    .stock-name-link {
      color: var(--text);
      text-decoration: none;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.35;
      display: inline-block;
    }

    .stock-name-link:hover,
    .stock-name-link:active {
      color: var(--blue);
      text-decoration: underline;
    }

    .stock-symbol {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      direction: ltr;
      text-align: right;
    }

    .stock-price-box {
      text-align: left;
      direction: ltr;
      min-width: 94px;
    }

    .stock-price {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.25;
    }

    .stock-change {
      font-size: 13px;
      font-weight: 800;
      margin-top: 5px;
    }

    .positive {
      color: var(--green);
    }

    .negative {
      color: var(--red);
    }

    .neutral {
      color: var(--muted);
    }

    .news-list {
      overflow: hidden;
    }

    .news-item {
      display: block;
      padding: 14px 15px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
    }

    .news-item:last-child {
      border-bottom: none;
    }

    .news-title {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.55;
    }

    .news-meta {
      margin-top: 7px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .news-source {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .news-date {
      white-space: nowrap;
      direction: ltr;
    }

    .controls {
      margin-top: 18px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      background: #f5f5f5;
      color: #050505;
    }

    button.secondary {
      background: #1f2937;
      color: #f5f5f5;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #moreNewsBtn {
      display: none;
    }

    .last-update {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(239, 68, 68, 0.14);
      color: var(--red);
      font-size: 13px;
      font-weight: 800;
      border: 1px solid rgba(239, 68, 68, 0.28);
    }

    .empty {
      padding: 18px 15px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <h1 class="title">داشبورد الأسهم</h1>
      <div class="subtitle" id="pageSubtitle">قراءة مباشرة من Supabase</div>
    </header>

    <section class="card index-card" id="indexCard">
      <div class="index-top">
        <div class="index-name">المؤشر العام TASI</div>
        <div class="status-pill" id="statusPill">جاري التحديث</div>
      </div>
      <div class="index-value" id="indexValue">--</div>
      <div class="index-change neutral" id="indexChange">--</div>
    </section>

    <section class="section">
      <h2 class="section-title">الأسهم</h2>
      <div class="card stocks" id="stocksContainer">
        <div class="empty">جاري تحميل الأسعار...</div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">الأخبار</h2>
      <div class="card news-list" id="newsContainer">
        <div class="empty">جاري تحميل الأخبار...</div>
      </div>
    </section>

    <section class="card controls">
      <button type="button" class="secondary" id="moreNewsBtn">المزيد</button>
      <button type="button" id="refreshBtn">تحديث الآن</button>
      <div class="last-update" id="lastUpdate">آخر تحديث: --</div>
      <div class="error" id="errorBox"></div>
    </section>
  </main>

  <script>
    const PRICES_URL = "https://qhqmvrfmvdxqzxwjdiny.supabase.co/storage/v1/object/public/mobile-data/prices.json";
    const NEWS_URL = "https://qhqmvrfmvdxqzxwjdiny.supabase.co/storage/v1/object/public/mobile-data/news.json";

    const NEWS_PAGE_SIZE = 7;

    const ARGAAM_COMPANY_IDS = {
      "1111": "4067",
      "1120": "43",
      "1140": "44",
      "1150": "826",
      "1180": "3413",
      "2010": "77",
      "2020": "79",
      "2222": "3509",
      "2290": "88",
      "2310": "585",
      "7010": "30",
      "7020": "31",
      "7202": "2983",
      "8010": "33",
      "8230": "870"
    };

    let allNews = [];
    let newsPage = 0;

    const els = {
      statusPill: document.getElementById("statusPill"),
      indexValue: document.getElementById("indexValue"),
      indexChange: document.getElementById("indexChange"),
      stocksContainer: document.getElementById("stocksContainer"),
      newsContainer: document.getElementById("newsContainer"),
      moreNewsBtn: document.getElementById("moreNewsBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      lastUpdate: document.getElementById("lastUpdate"),
      errorBox: document.getElementById("errorBox"),
      pageSubtitle: document.getElementById("pageSubtitle")
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function toNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      const n = Number(String(value).replaceAll(",", "").replaceAll("%", ""));
      return Number.isFinite(n) ? n : null;
    }

    function formatNumber(value, digits = 2) {
      const n = toNumber(value);
      if (n === null) return "--";
      return n.toLocaleString("en-US", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function formatSigned(value, digits = 2) {
      const n = toNumber(value);
      if (n === null) return "--";
      const sign = n > 0 ? "+" : "";
      return sign + n.toLocaleString("en-US", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function getChangeClass(value) {
      const n = toNumber(value);
      if (n === null || n === 0) return "neutral";
      return n > 0 ? "positive" : "negative";
    }

    function getArrayFromPayload(payload, keys) {
      if (Array.isArray(payload)) return payload;

      for (const key of keys) {
        if (Array.isArray(payload?.[key])) return payload[key];
      }

      if (Array.isArray(payload?.data)) return payload.data;
      if (Array.isArray(payload?.items)) return payload.items;

      return [];
    }

    function getField(row, keys, fallback = "") {
      for (const key of keys) {
        if (row && row[key] !== undefined && row[key] !== null && row[key] !== "") {
          return row[key];
        }
      }
      return fallback;
    }

    function normalizeSymbol(value) {
      return String(value ?? "")
        .replace(".SR", "")
        .replace("TADAWUL:", "")
        .trim();
    }

    function getArgaamUrl(symbol) {
      const id = ARGAAM_COMPANY_IDS[symbol];
      if (!id) return "";
      return `https://www.argaam.com/ar/company/companyoverview/marketid/3/companyid/${id}`;
    }

    function renderStatus(pricesPayload) {
      const status = pricesPayload?.status || "";
      const statusText = pricesPayload?.status_text || pricesPayload?.statusText || "";

      els.statusPill.textContent = statusText || (status === "live" ? "متصل مباشر" : "غير متصل");

      if (status === "live") {
        els.statusPill.classList.remove("offline");
      } else {
        els.statusPill.classList.add("offline");
      }
    }

    function renderIndex(pricesPayload) {
      const rawStocks = getArrayFromPayload(pricesPayload, ["stocks", "prices", "rows", "symbols"]);

      const index =
        pricesPayload?.index ||
        pricesPayload?.tasi ||
        pricesPayload?.market_index ||
        pricesPayload?.marketIndex ||
        null;

      let value = null;
      let change = null;
      let changePct = null;

      if (index) {
        value = getField(index, ["value", "price", "last", "last_price", "lastPrice", "close"]);
        change = getField(index, ["change", "net_change", "netChange"]);
        changePct = getField(index, ["change_percent", "changePercent", "change_pct", "pct", "percent"]);
      } else {
        const maybeTasi = rawStocks.find((row) => {
          const symbol = normalizeSymbol(getField(row, ["symbol", "code", "ticker"]));
          const name = String(getField(row, ["name", "stock", "company", "company_name", "arabic_name"]));
          return symbol.toUpperCase() === "TASI" || name.includes("تاسي") || name.includes("المؤشر");
        });

        if (maybeTasi) {
          value = getField(maybeTasi, ["price", "last", "last_price", "lastPrice", "close"]);
          change = getField(maybeTasi, ["change", "net_change", "netChange"]);
          changePct = getField(maybeTasi, ["change_percent", "changePercent", "change_pct", "pct", "percent"]);
        }
      }

      els.indexValue.textContent = formatNumber(value, 2);

      const changeText = `${formatSigned(change, 2)}  (${formatSigned(changePct, 2)}%)`;
      els.indexChange.textContent = changeText;
      els.indexChange.className = "index-change " + getChangeClass(change || changePct);
    }

    function renderStockName(row) {
      const symbol = normalizeSymbol(getField(row, ["symbol", "code", "ticker"]));
      const name = getField(row, ["name", "stock", "company", "company_name", "arabic_name"], symbol);
      const link = getArgaamUrl(symbol);

      if (link) {
        return `<a class="stock-name-link" href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(name)}</a>`;
      }

      return `<span class="stock-name-link">${escapeHtml(name)}</span>`;
    }

    function renderStocks(pricesPayload) {
      let stocks = getArrayFromPayload(pricesPayload, ["stocks", "prices", "rows", "symbols"]);

      stocks = stocks.filter((row) => {
        const symbol = normalizeSymbol(getField(row, ["symbol", "code", "ticker"]));
        const name = String(getField(row, ["name", "stock", "company", "company_name", "arabic_name"]));
        return symbol.toUpperCase() !== "TASI" && !name.includes("المؤشر العام");
      });

      if (!stocks.length) {
        els.stocksContainer.innerHTML = `<div class="empty">لا توجد أسعار متاحة</div>`;
        return;
      }

      els.stocksContainer.innerHTML = stocks.map((row) => {
        const symbol = normalizeSymbol(getField(row, ["symbol", "code", "ticker"]));
        const price = getField(row, ["price", "last", "last_price", "lastPrice", "close"]);
        const change = getField(row, ["change", "net_change", "netChange"]);
        const changePct = getField(row, ["change_percent", "changePercent", "change_pct", "pct", "percent"]);
        const changeClass = getChangeClass(change || changePct);

        return `
          <div class="stock-row">
            <div class="stock-main">
              ${renderStockName(row)}
              <div class="stock-symbol">${escapeHtml(symbol)}</div>
            </div>
            <div class="stock-price-box">
              <div class="stock-price">${formatNumber(price, 2)}</div>
              <div class="stock-change ${changeClass}">
                ${formatSigned(change, 2)} / ${formatSigned(changePct, 2)}%
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function normalizeNewsDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleString("ar-SA", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderNews() {
      if (!allNews.length) {
        els.newsContainer.innerHTML = `<div class="empty">لا توجد أخبار متاحة</div>`;
        els.moreNewsBtn.style.display = "none";
        return;
      }

      const start = newsPage * NEWS_PAGE_SIZE;
      const end = start + NEWS_PAGE_SIZE;
      const pageItems = allNews.slice(start, end);

      els.newsContainer.innerHTML = pageItems.map((item) => {
        const title = getField(item, ["title", "headline", "name"], "خبر بدون عنوان");
        const url = getField(item, ["url", "link", "href"], "#");
        const source = getField(item, ["source", "feed", "category"], "أرقام");
        const date = getField(item, ["date", "published", "pubDate", "published_at", "publishedAt"], "");

        return `
          <a class="news-item" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">
            <div class="news-title">${escapeHtml(title)}</div>
            <div class="news-meta">
              <span class="news-source">${escapeHtml(source)}</span>
              <span class="news-date">${escapeHtml(normalizeNewsDate(date))}</span>
            </div>
          </a>
        `;
      }).join("");

      els.moreNewsBtn.style.display = allNews.length > NEWS_PAGE_SIZE ? "block" : "none";

      if (end >= allNews.length) {
        els.moreNewsBtn.textContent = "إخفاء";
      } else {
        els.moreNewsBtn.textContent = "المزيد";
      }
    }

    function renderLastUpdate(pricesPayload, newsPayload) {
      const updated =
        pricesPayload?.updated_at ||
        pricesPayload?.updatedAt ||
        pricesPayload?.last_update ||
        pricesPayload?.lastUpdate ||
        newsPayload?.updated_at ||
        newsPayload?.updatedAt ||
        newsPayload?.last_update ||
        newsPayload?.lastUpdate ||
        new Date().toISOString();

      els.lastUpdate.textContent = "آخر تحديث: " + normalizeNewsDate(updated);
    }

    function showError(message) {
      els.errorBox.textContent = message;
      els.errorBox.style.display = "block";
    }

    function clearError() {
      els.errorBox.textContent = "";
      els.errorBox.style.display = "none";
    }

    async function fetchJson(url) {
      const response = await fetch(url + "?t=" + Date.now(), {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("فشل تحميل البيانات: " + response.status);
      }

      return response.json();
    }

    async function loadDashboard() {
      clearError();
      els.refreshBtn.disabled = true;
      els.refreshBtn.textContent = "جاري التحديث...";

      try {
        const [pricesPayload, newsPayload] = await Promise.all([
          fetchJson(PRICES_URL),
          fetchJson(NEWS_URL)
        ]);

        renderStatus(pricesPayload);
        renderIndex(pricesPayload);
        renderStocks(pricesPayload);

        allNews = getArrayFromPayload(newsPayload, ["news", "items", "articles", "rows"]);
        newsPage = 0;
        renderNews();

        renderLastUpdate(pricesPayload, newsPayload);

        els.pageSubtitle.textContent = "قراءة مباشرة من Supabase";
      } catch (error) {
        console.error(error);
        showError("تعذر تحديث البيانات من Supabase. تأكد من رفع news.json و prices.json الصحيحين.");
        els.statusPill.textContent = "غير متصل";
        els.statusPill.classList.add("offline");
      } finally {
        els.refreshBtn.disabled = false;
        els.refreshBtn.textContent = "تحديث الآن";
      }
    }

    els.moreNewsBtn.addEventListener("click", () => {
      const start = newsPage * NEWS_PAGE_SIZE;
      const end = start + NEWS_PAGE_SIZE;

      if (end >= allNews.length) {
        newsPage = 0;
      } else {
        newsPage += 1;
      }

      renderNews();
    });

    els.refreshBtn.addEventListener("click", () => {
      loadDashboard();
    });

    loadDashboard();
  </script>
</body>
</html>
